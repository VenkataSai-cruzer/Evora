name: Deploy Frontend to Cloudflare Workers

on:
  push:
    branches: [deployment/final-cloudflare-render-architecture, main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'package-lock.json'

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Workers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Next.js + OpenNext)
        working-directory: apps/web
        run: npx next build && npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://seven-notes-api.onrender.com/api/v1
          NEXT_PUBLIC_APP_ENV: staging
          NEXT_PUBLIC_ENABLE_TEST_PAYMENT: true

      - name: Deploy to Cloudflare Workers
        working-directory: apps/web
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
