# Render Blueprint for 7 NOTES Staging Backend API
# Docs: https://render.com/docs/blueprint-spec
#
# ── Architecture ─────────────────────────────────────────
# Backend: Fastify + Prisma (PostgreSQL via Supabase)
# Frontend: Cloudflare Workers (deployed separately)
#
# ── Monorepo Setup ───────────────────────────────────────
# rootDir: . (repository root)
# This ensures apps/api has access to the root-level prisma/ schema,
# packages/shared, and the root node_modules workspace hoisting.
#
# ── Staging URLs (temp) ──────────────────────────────────
# Backend:  https://seven-notes-api.onrender.com
# Frontend: https://evora.7notes.workers.dev

services:
  # ── Backend API (Fastify + Prisma + PostgreSQL) ────────
  - type: web
    name: seven-notes-api
    env: node
    region: singapore
    plan: free
    rootDir: .     # Repository root — needed for prisma/ and packages/

    buildCommand: |
      npm install --workspace=apps/api --include-workspace-root
      npx prisma generate --schema=prisma/schema.prisma
      npm run build --workspace=apps/api

    # preDeployCommand not supported on free tier — migrations run inline in startCommand
    startCommand: npx prisma migrate deploy --schema=prisma/schema.prisma && npm run start --workspace=apps/api

    healthCheckPath: /api/v1/ready

    autoDeploy: true
    numInstances: 1

    envVars:
      # ── Node & Runtime ──────────────────────────────────
      - key: NODE_ENV
        value: staging

      - key: APP_ENV
        value: staging

      - key: PORT
        value: 10000

      - key: HOST
        value: 0.0.0.0

      # ── URLs (update after frontend deploy) ─────────────
      - key: CORS_ORIGIN
        value: https://evora.7notes.workers.dev

      - key: FRONTEND_URL
        value: https://evora.7notes.workers.dev

      - key: API_BASE_URL
        value: https://seven-notes-api.onrender.com/api/v1

      # ── Session & Security ──────────────────────────────
      - key: SESSION_SECRET
        generateValue: true

      - key: CSRF_SECRET
        generateValue: true

      - key: QR_SECRET
        generateValue: true

      - key: COOKIE_NAME
        value: seven_notes_staging_session

      # ── Staging CORS ────────────────────────────────────
      - key: COOKIE_SECURE
        value: "true"

      - key: COOKIE_SAME_SITE
        value: none

      # ── Supabase PostgreSQL (staging) ───────────────────
      # Create a Supabase project named "evora"
      # Copy connection strings from Project Settings > Database
      - key: DATABASE_URL
        sync: false

      # Direct connection for migrations (Supavisor session pooler on port 5432)
      - key: DIRECT_URL
        sync: false

      # ── Build & Tooling ──────────────────────────────────
      - key: HUSKY
        value: "0"

      # ── Feature Flags (staging-safe) ────────────────────
      - key: ENABLE_TEST_PAYMENT
        value: "true"

      - key: ENABLE_REAL_PAYMENTS
        value: "false"

      - key: ENABLE_EMAIL
        value: "false"

      - key: ENABLE_R2
        value: "false"

      - key: LOG_LEVEL
        value: info

      # ── Cloudflare R2 ───────────────────────────────────
      - key: R2_ACCOUNT_ID
        sync: false

      - key: R2_ACCESS_KEY_ID
        sync: false

      - key: R2_SECRET_ACCESS_KEY
        sync: false

      - key: R2_BUCKET_NAME
        value: evora

      - key: R2_ENDPOINT
        sync: false

      # ── Resend (Email, disabled in staging) ─────────────
      - key: RESEND_API_KEY
        sync: false

      - key: EMAIL_FROM
        value: 7 NOTES Staging <staging@7notes.in>

      # ── Staging Accounts ────────────────────────────────
      - key: STAGING_ADMIN_EMAIL
        value: admin@7notes.in

      - key: STAGING_ADMIN_PASSWORD
        sync: false

      - key: STAGING_ATTENDEE_EMAIL
        value: attendee@7notes.in

      - key: STAGING_ATTENDEE_PASSWORD
        sync: false
